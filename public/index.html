<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Inbox Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --surface-2: #1e1e2a;
      --border: #2a2a3a;
      --border-strong: #383850;
      --text: #e8e8f0;
      --text-dim: #8a8a9e;
      --text-faint: #5c5c70;
      --accent: #7c5cff;
      --accent-2: #4f8cff;
      --high: #ff5c7a;
      --medium: #ffb84d;
      --low: #4dd4a0;

      --font-display: "Space Grotesk", system-ui, sans-serif;
      --font-body: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background:
        radial-gradient(ellipse 900px 420px at 20% -10%, rgba(124, 92, 255, 0.10), transparent 60%),
        radial-gradient(ellipse 700px 380px at 95% 0%, rgba(79, 140, 255, 0.07), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px 64px; }

    /* ---------- Header ---------- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    .subtitle {
      color: var(--text-dim);
      margin-top: 6px;
      font-size: 0.95rem;
      max-width: 46ch;
    }

    .live-status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .live-line { display: flex; align-items: center; gap: 8px; }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--low);
      box-shadow: 0 0 0 0 rgba(77, 212, 160, 0.5);
      animation: pulse 2.4s ease-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(77, 212, 160, 0.45); }
      70%  { box-shadow: 0 0 0 9px rgba(77, 212, 160, 0); }
      100% { box-shadow: 0 0 0 0 rgba(77, 212, 160, 0); }
    }

    .last-updated { color: var(--text-faint); }

    /* ---------- Stats ---------- */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px 16px;
      position: relative;
      overflow: hidden;
    }

    .stat::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--border-strong);
    }

    .stat.total::before { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .stat.high::before   { background: var(--high); }
    .stat.medium::before { background: var(--medium); }
    .stat.low::before    { background: var(--low); }

    .stat .num {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .stat.high .num   { color: var(--high); }
    .stat.medium .num { color: var(--medium); }
    .stat.low .num    { color: var(--low); }

    .stat .label {
      color: var(--text-dim);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ---------- Filters ---------- */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 999px;
      padding: 8px 16px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .filter-btn .count {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-faint);
      margin-left: 6px;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }

    .filter-btn:focus-visible {
      outline: 2px solid var(--accent-2);
      outline-offset: 2px;
    }

    .filter-btn.active {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #fff;
      font-weight: 600;
    }

    .filter-btn.active .count { color: rgba(255, 255, 255, 0.75); }

    /* ---------- Message cards ---------- */
    .messages { display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 14px;
      padding: 18px 22px;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      animation: cardIn 0.3s ease-out both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card.p-High   { border-left-color: var(--high); }
    .card.p-Medium { border-left-color: var(--medium); }
    .card.p-Low    { border-left-color: var(--low); }

    .card:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    }

    .card.p-High:hover   { border-left-color: var(--high); }
    .card.p-Medium:hover { border-left-color: var(--medium); }
    .card.p-Low:hover    { border-left-color: var(--low); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badges { display: flex; gap: 8px; flex-wrap: wrap; }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid;
    }

    .badge.category { color: var(--accent-2); border-color: rgba(79, 140, 255, 0.45); }
    .badge.priority-High   { color: var(--high);   border-color: rgba(255, 92, 122, 0.45); }
    .badge.priority-Medium { color: var(--medium); border-color: rgba(255, 184, 77, 0.45); }
    .badge.priority-Low    { color: var(--low);    border-color: rgba(77, 212, 160, 0.45); }

    .time {
      font-family: var(--font-mono);
      color: var(--text-faint);
      font-size: 0.75rem;
      cursor: default;
    }

    .summary { font-size: 1rem; line-height: 1.55; margin-bottom: 12px; }

    .meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      color: var(--text-dim);
      font-size: 0.83rem;
    }

    .meta .k { color: var(--text-faint); }
    .meta strong { color: var(--text); font-weight: 600; }

    /* ---------- Original message (expandable) ---------- */
    details { margin-top: 12px; }

    summary {
      cursor: pointer;
      color: var(--accent);
      font-size: 0.83rem;
      font-weight: 500;
      user-select: none;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    summary::-webkit-details-marker { display: none; }

    summary::before {
      content: "▸";
      font-size: 0.7rem;
      transition: transform 0.15s;
    }

    details[open] summary::before { transform: rotate(90deg); }

    summary:focus-visible {
      outline: 2px solid var(--accent-2);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .original-body {
      margin-top: 10px;
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.88rem;
      color: var(--text-dim);
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .original-from {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    /* ---------- Empty state ---------- */
    .empty {
      text-align: center;
      padding: 72px 24px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      color: var(--text-dim);
    }

    .empty .title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .empty .hint { font-size: 0.88rem; max-width: 52ch; margin: 0 auto; }

    /* ---------- Responsive ---------- */
    @media (max-width: 720px) {
      .container { padding: 28px 16px 48px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      header { align-items: flex-start; flex-direction: column; }
      .live-status { align-items: flex-start; }
      h1 { font-size: 1.6rem; }
    }

    /* ---------- Reduced motion ---------- */
    @media (prefers-reduced-motion: reduce) {
      .live-dot { animation: none; }
      .card { animation: none; }
      .card:hover { transform: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Smart Inbox Assistant</h1>
        <div class="subtitle">
          Incoming messages, automatically summarized, categorized and
          prioritized by AI.
        </div>
      </div>
      <div class="live-status">
        <div class="live-line">
          <span class="live-dot" aria-hidden="true"></span>
          <span>Live &middot; updates every 10s</span>
        </div>
        <span class="last-updated" id="last-updated">&nbsp;</span>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="filters" id="filters" role="tablist" aria-label="Filter by category"></div>

    <div class="messages" id="messages">
      <div class="empty">
        <div class="title">Loading messages&hellip;</div>
      </div>
    </div>
  </div>

  <script>
    const CATEGORIES = ["All", "Order", "Complaint", "General Question", "Spam"];
    let activeFilter = "All";
    let allMessages = [];

    // ---------- Helpers ----------

    // Escape user-provided text before inserting into HTML.
    // Incoming messages are untrusted input — without this, a message
    // containing <script> tags could run code in the dashboard (XSS).
    function esc(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    // "5 min ago" style relative time; full timestamp goes into a tooltip
    function relativeTime(iso) {
      const then = new Date(iso).getTime();
      const diffSec = Math.round((Date.now() - then) / 1000);
      if (diffSec < 60) return "just now";
      const diffMin = Math.round(diffSec / 60);
      if (diffMin < 60) return `${diffMin} min ago`;
      const diffH = Math.round(diffMin / 60);
      if (diffH < 24) return `${diffH} h ago`;
      const diffD = Math.round(diffH / 24);
      if (diffD < 7) return `${diffD} d ago`;
      return new Date(iso).toLocaleDateString();
    }

    // ---------- Rendering ----------

    function renderStats() {
      const counts = { High: 0, Medium: 0, Low: 0 };
      for (const m of allMessages) counts[m.processed.priority]++;

      document.getElementById("stats").innerHTML = `
        <div class="stat total">
          <div class="num">${allMessages.length}</div>
          <div class="label">Total messages</div>
        </div>
        <div class="stat high">
          <div class="num">${counts.High}</div>
          <div class="label">High priority</div>
        </div>
        <div class="stat medium">
          <div class="num">${counts.Medium}</div>
          <div class="label">Medium priority</div>
        </div>
        <div class="stat low">
          <div class="num">${counts.Low}</div>
          <div class="label">Low priority</div>
        </div>`;
    }

    function categoryCount(category) {
      if (category === "All") return allMessages.length;
      return allMessages.filter((m) => m.processed.category === category).length;
    }

    function renderFilters() {
      document.getElementById("filters").innerHTML = CATEGORIES.map(
        (c) => `<button
                  class="filter-btn ${c === activeFilter ? "active" : ""}"
                  role="tab"
                  aria-selected="${c === activeFilter}"
                  onclick="setFilter('${c}')"
                >${c}<span class="count">${categoryCount(c)}</span></button>`
      ).join("");
    }

    function setFilter(category) {
      activeFilter = category;
      renderFilters();
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById("messages");
      const visible =
        activeFilter === "All"
          ? allMessages
          : allMessages.filter((m) => m.processed.category === activeFilter);

      if (visible.length === 0) {
        const hint =
          activeFilter === "All"
            ? "Send a message to the webhook or watched mailbox and it will show up here within seconds."
            : `No messages in “${esc(activeFilter)}” yet — new ones land here automatically.`;
        container.innerHTML = `
          <div class="empty">
            <div class="title">Nothing here yet</div>
            <div class="hint">${hint}</div>
          </div>`;
        return;
      }

      container.innerHTML = visible
        .map((m) => {
          const p = m.processed;
          const fullTime = new Date(m.receivedAt).toLocaleString();
          const fromLine = m.original.from
            ? `<div class="original-from">From: ${esc(m.original.from)}${
                m.original.subject ? ` &middot; Subject: ${esc(m.original.subject)}` : ""
              }</div>`
            : "";
          return `
          <article class="card p-${esc(p.priority)}">
            <div class="card-top">
              <div class="badges">
                <span class="badge category">${esc(p.category)}</span>
                <span class="badge priority-${esc(p.priority)}">${esc(p.priority)}</span>
              </div>
              <span class="time" title="${esc(fullTime)}">${esc(relativeTime(m.receivedAt))}</span>
            </div>
            <div class="summary">${esc(p.summary)}</div>
            <div class="meta">
              <span><span class="k">From</span> <strong>${esc(p.sender_name)}</strong></span>
              <span><span class="k">Contact</span> <strong>${esc(p.contact)}</strong></span>
              <span><span class="k">Topic</span> <strong>${esc(p.topic)}</strong></span>
            </div>
            <details>
              <summary>Original message</summary>
              <div class="original-body">${fromLine}${esc(m.original.body)}</div>
            </details>
          </article>`;
        })
        .join("");
    }

    // ---------- Data loading ----------

    async function loadMessages() {
      try {
        const res = await fetch("/api/messages");
        allMessages = await res.json();
        renderStats();
        renderFilters();
        renderMessages();
        const now = new Date();
        document.getElementById("last-updated").textContent =
          "last update " + now.toLocaleTimeString();
      } catch (err) {
        console.error("Failed to load messages:", err);
      }
    }

    // Initial render + auto-refresh every 10 seconds.
    // The dashboard updates itself — no manual reload needed.
    renderFilters();
    loadMessages();
    setInterval(loadMessages, 10000);
  </script>
</body>
</html>
