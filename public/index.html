<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Inbox Assistant</title>
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --surface-2: #1e1e2a;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-dim: #8a8a9e;
      --accent: #7c5cff;
      --accent-2: #4f8cff;
      --high: #ff5c7a;
      --medium: #ffb84d;
      --low: #4dd4a0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

    /* ---------- Header ---------- */
    header { margin-bottom: 28px; }

    h1 {
      font-size: 1.7rem;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    .subtitle { color: var(--text-dim); margin-top: 4px; font-size: 0.95rem; }

    /* ---------- Stats ---------- */
    .stats { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      min-width: 120px;
    }

    .stat .num { font-size: 1.6rem; font-weight: 700; }
    .stat .label { color: var(--text-dim); font-size: 0.8rem; margin-top: 2px; }
    .stat.high .num { color: var(--high); }
    .stat.medium .num { color: var(--medium); }
    .stat.low .num { color: var(--low); }

    /* ---------- Filters ---------- */
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }

    .filter-btn.active {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #fff;
      font-weight: 600;
    }

    /* ---------- Message cards ---------- */
    .messages { display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: var(--accent); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badges { display: flex; gap: 8px; flex-wrap: wrap; }

    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid;
    }

    .badge.category { color: var(--accent-2); border-color: var(--accent-2); }
    .badge.priority-High { color: var(--high); border-color: var(--high); }
    .badge.priority-Medium { color: var(--medium); border-color: var(--medium); }
    .badge.priority-Low { color: var(--low); border-color: var(--low); }

    .time { color: var(--text-dim); font-size: 0.8rem; }

    .summary { font-size: 1rem; line-height: 1.5; margin-bottom: 12px; }

    .meta {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .meta strong { color: var(--text); font-weight: 600; }

    /* ---------- Original message (expandable) ---------- */
    details { margin-top: 12px; }

    summary {
      cursor: pointer;
      color: var(--accent);
      font-size: 0.85rem;
      user-select: none;
    }

    .original-body {
      margin-top: 8px;
      padding: 12px 14px;
      background: var(--surface-2);
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text-dim);
      white-space: pre-wrap;
    }

    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 60px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Smart Inbox Assistant</h1>
      <div class="subtitle">Incoming messages, automatically triaged by AI</div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="filters" id="filters"></div>

    <div class="messages" id="messages">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <script>
    const CATEGORIES = ["All", "Order", "Complaint", "General Question", "Spam"];
    let activeFilter = "All";
    let allMessages = [];

    // ---------- Rendering ----------

    function renderStats() {
      const counts = { High: 0, Medium: 0, Low: 0 };
      for (const m of allMessages) counts[m.processed.priority]++;

      document.getElementById("stats").innerHTML = `
        <div class="stat">
          <div class="num">${allMessages.length}</div>
          <div class="label">Total messages</div>
        </div>
        <div class="stat high">
          <div class="num">${counts.High}</div>
          <div class="label">High priority</div>
        </div>
        <div class="stat medium">
          <div class="num">${counts.Medium}</div>
          <div class="label">Medium priority</div>
        </div>
        <div class="stat low">
          <div class="num">${counts.Low}</div>
          <div class="label">Low priority</div>
        </div>`;
    }

    function renderFilters() {
      document.getElementById("filters").innerHTML = CATEGORIES.map(
        (c) => `<button
                  class="filter-btn ${c === activeFilter ? "active" : ""}"
                  onclick="setFilter('${c}')">${c}</button>`
      ).join("");
    }

    function setFilter(category) {
      activeFilter = category;
      renderFilters();
      renderMessages();
    }

    // Escape user-provided text before inserting into HTML.
    // Incoming messages are untrusted input — without this, a message
    // containing <script> tags could run code in the dashboard (XSS).
    function esc(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function renderMessages() {
      const container = document.getElementById("messages");
      const visible =
        activeFilter === "All"
          ? allMessages
          : allMessages.filter((m) => m.processed.category === activeFilter);

      if (visible.length === 0) {
        container.innerHTML = `<div class="empty">No messages here yet.</div>`;
        return;
      }

      container.innerHTML = visible
        .map((m) => {
          const p = m.processed;
          const time = new Date(m.receivedAt).toLocaleString();
          return `
          <div class="card">
            <div class="card-top">
              <div class="badges">
                <span class="badge category">${esc(p.category)}</span>
                <span class="badge priority-${esc(p.priority)}">${esc(p.priority)}</span>
              </div>
              <span class="time">${esc(time)}</span>
            </div>
            <div class="summary">${esc(p.summary)}</div>
            <div class="meta">
              <span>From: <strong>${esc(p.sender_name)}</strong></span>
              <span>Contact: <strong>${esc(p.contact)}</strong></span>
              <span>Topic: <strong>${esc(p.topic)}</strong></span>
            </div>
            <details>
              <summary>Show original message</summary>
              <div class="original-body">${esc(m.original.body)}</div>
            </details>
          </div>`;
        })
        .join("");
    }

    // ---------- Data loading ----------

    async function loadMessages() {
      try {
        const res = await fetch("/api/messages");
        allMessages = await res.json();
        renderStats();
        renderMessages();
      } catch (err) {
        console.error("Failed to load messages:", err);
      }
    }

    // Initial render + auto-refresh every 10 seconds.
    // The dashboard updates itself — no manual reload needed.
    renderFilters();
    loadMessages();
    setInterval(loadMessages, 10000);
  </script>
</body>
</html>
